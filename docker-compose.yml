services:
  db:
    image: postgres:15-alpine
    container_name: voicebot-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: interview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: voicebot-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./interviews:/app/interviews
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER:-postgres://postgres:1234@db:5432/interview}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8502}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}

  frontend:
    build:
      context: ./frontend-new
      dockerfile: Dockerfile
    container_name: voicebot-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8502:80"

volumes:
  postgres_data:
